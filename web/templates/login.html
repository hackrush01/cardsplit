<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border border-gray-100">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Welcome Back</h2>
        
        <!-- HTMX Form: Posts to /login, targets the message div on response -->
        <form hx-post="/login" hx-target="#login-message" hx-swap="innerHTML">
            
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="username">Select User</label>
                <div class="relative">
                    <select id="username" name="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white">
                        <option value="" disabled selected>Choose an account</option>
                        {{range .Users}}
                            <option value="{{.}}">{{.}}</option>
                        {{end}}
                    </select>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="password">Password</label>
                <input type="password" id="password" name="password" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" 
                    placeholder="Password">
                <p class="text-xs text-gray-500 mt-2">If this is your first time logging in, the password you enter will be saved as your permanent password.</p>
            </div>

            <!-- Error messages from the backend will be injected here -->
            <div id="login-message" class="mb-4 text-center empty:hidden"></div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-200">
                Sign In
            </button>
        </form>
    </div>

</body>
</html>
