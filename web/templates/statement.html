<!-- web/templates/statement.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Statement View</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white shadow-md rounded-lg p-6">
        <h1 class="text-2xl font-bold mb-4">View Statement</h1>

        <!-- The Auto-Submitting Form -->
        <form method="GET" action="/statement" class="mb-8 p-4 border border-dashed border-gray-300 rounded bg-gray-50">
            <div class="flex flex-col md:flex-row md:space-x-4">
                <div class="flex-1 mb-4 md:mb-0">
                    <label for="card_name" class="block text-gray-700 text-sm font-semibold mb-2">Card Name:</label>
                    <select name="card_name" id="card_name" onchange="this.form.submit()" class="w-full px-4 py-2 border border-gray-300 rounded-lg appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white">
                        <option value="">-- Select a Card --</option>
                        {{ range .AvailableCards }}
                            <option value="{{ . }}" {{ if eq . $.SelectedCard }}selected{{ end }}>{{ . }}</option>
                        {{ end }}
                    </select>
                </div>

                <div class="flex-1">
                    <label for="statement_date" class="block text-gray-700 text-sm font-semibold mb-2">Statement Date:</label>
                    <select name="statement_date" id="statement_date" onchange="this.form.submit()" class="w-full px-4 py-2 border border-gray-300 rounded-lg appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white">
                        <option value="">-- Select a Date --</option>
                        {{ range .AvailableDates }}
                            <option value="{{ . }}" {{ if eq . $.SelectedDate }}selected{{ end }}>{{ . }}</option>
                        {{ end }}
                    </select>
                </div>
            </div>
        </form>

        <div class="my-6 border-t border-gray-200"></div>

        <!-- Only show the summary and table if both filters are selected -->
        {{ if and .SelectedCard .SelectedDate }}
            <div class="mb-8 p-4 border border-gray-200 rounded bg-gray-50">
                <h2 class="text-xl font-bold mb-2">Statement Summary</h2>
                <h3 class="text-lg font-semibold text-gray-800">Total Due: ₹{{ printf "%.2f" .TotalDueRupees }}</h3>
            </div>
            
            <div class="transactions-section">
                {{ template "transactions-table" . }}
            </div>
        {{ else }}
            <p class="text-gray-500 text-sm p-4">Please select a card and a statement date to load your transactions.</p>
        {{ end }}
    </div>
</body>
</html>
